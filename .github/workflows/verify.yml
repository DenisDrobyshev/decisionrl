name: Verify applied claims

# Nightly reproducibility guard: re-trains every applied task over multiple seeds
# and fails if any "RL wins" claim in the README regresses below its classical
# baseline. Keeps the headline numbers honest over time, not just at commit.

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch: {}

jobs:
  verify:
    name: verify applied claims (3 seeds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Verify (fails if a win regresses)
        env:
          OMP_NUM_THREADS: "1"
        run: python examples/verify_applied_claims.py --seeds 3 --check
      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applied-claims
          path: verify_applied_claims.json
