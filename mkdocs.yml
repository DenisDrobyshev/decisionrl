site_name: reinforce
site_description: A dependency-light, correctness-first reinforcement learning foundation
site_author: Denis Drobyshev
repo_url: https://github.com/DenisDrobyshev/reinforce
repo_name: DenisDrobyshev/reinforce
docs_dir: docs
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Algorithms: algorithms.md
  - Benchmarks: benchmarks.md
  - Environments: environments.md
  - Command-line interface: cli.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
